<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Claw Console</title>
    <style>
      :root {
        --bg: #f3efe7;
        --panel: #fffaf2;
        --ink: #1c1917;
        --muted: #57534e;
        --line: #d6d3d1;
        --accent: #c2410c;
        --accent-dark: #9a3412;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(194, 65, 12, 0.08), transparent 26%),
          linear-gradient(180deg, #f7f3ec 0%, var(--bg) 100%);
        min-height: 100vh;
      }

      .shell {
        max-width: 920px;
        margin: 0 auto;
        padding: 40px 20px 72px;
      }

      .hero {
        margin-bottom: 24px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(194, 65, 12, 0.12);
        color: var(--accent-dark);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 10px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 1.02;
      }

      .lead {
        max-width: 640px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(214, 211, 209, 0.9);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 18px 50px rgba(28, 25, 23, 0.08);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 13px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 180ms ease, background 180ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: var(--accent);
        color: #fff7ed;
      }

      .secondary {
        background: #ece7df;
        color: var(--ink);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.25fr 0.95fr;
        gap: 18px;
        margin-top: 18px;
      }

      .card {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .status {
        color: var(--muted);
        line-height: 1.7;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      .code-box {
        min-height: 150px;
        background: #171717;
        color: #fafaf9;
        border-radius: 16px;
        padding: 16px;
      }

      .tips {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.8;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <span class="eyebrow">Open Claw Console</span>
        <h1>飞书前端授权入口</h1>
        <p class="lead">
          这个页面专门用来在飞书容器里获取 <code>auth code</code>。拿到后，你就可以回到本地脚本里换
          <code>user_access_token</code>，继续建表和回写。
        </p>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="get-code" class="primary">获取 Auth Code</button>
          <button id="copy-code" class="secondary">复制 Code</button>
        </div>

        <div class="grid">
          <article class="card">
            <h2>状态</h2>
            <div id="status" class="status">页面已加载，等待点击。</div>
          </article>

          <article class="card">
            <h2>下一步</h2>
            <ol class="tips">
              <li>点击“获取 Auth Code”。</li>
              <li>复制下面显示的 code。</li>
              <li>回到本地运行换 token 命令。</li>
            </ol>
          </article>
        </div>

        <div class="card" style="margin-top: 18px;">
          <h2>Auth Code</h2>
          <div class="code-box">
            <pre id="output">尚未获取。</pre>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
  </html>
